<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alnasma — رافع الصور</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Cairo', sans-serif; background: #F5F0E8; min-height: 100vh; padding: 32px 20px; }
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

  h1 { text-align: center; color: #1C3020; font-size: 1.6rem; font-weight: 900; margin-bottom: 6px; }
  .subtitle { text-align: center; color: #4E7854; font-size: .9rem; margin-bottom: 28px; }

  #pick-btn {
    display: block; margin: 0 auto 32px;
    padding: 14px 36px;
    background: #2E5D34; color: #fff;
    font-family: 'Cairo', sans-serif; font-size: 1rem; font-weight: 700;
    border: none; border-radius: 14px; cursor: pointer;
    transition: background .2s;
  }
  #pick-btn:hover { background: #1C3020; }
  #pick-btn.picked { background: #4E7854; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; max-width: 900px; margin: 0 auto; }

  .zone {
    background: #fff; border: 2.5px dashed #C4D9C6; border-radius: 18px;
    padding: 20px 14px; text-align: center; cursor: pointer;
    transition: all .2s; position: relative;
  }
  .zone.over { border-color: #2E5D34; background: #EBF2EC; transform: scale(1.02); }
  .zone.done { border-style: solid; border-color: #2E5D34; background: #EBF2EC; }

  .zone .emoji { font-size: 2.2rem; margin-bottom: 8px; }
  .zone .name-ar { font-size: .95rem; font-weight: 700; color: #1C3020; margin-bottom: 4px; }
  .zone .filename { font-size: .72rem; color: #4E7854; font-family: monospace; background: #D5E6D7; padding: 2px 8px; border-radius: 6px; display: inline-block; margin-bottom: 10px; }
  .zone .hint { font-size: .78rem; color: #8AAE8D; margin-top: 4px; }
  .zone .status { font-size: .85rem; font-weight: 700; color: #2E5D34; margin-top: 8px; min-height: 20px; }
  .zone .preview { width: 100%; height: 110px; object-fit: cover; border-radius: 10px; margin-top: 10px; display: none; }
  .zone.done .preview { display: block; }
  .zone.done .hint { display: none; }

  .note { text-align: center; color: #8AAE8D; font-size: .78rem; margin-top: 24px; max-width: 500px; margin-left: auto; margin-right: auto; }

  #folder-name { text-align: center; font-size: .82rem; color: #4E7854; margin-bottom: 20px; font-weight: 700; display: none; }
</style>
</head>
<body>

<h1>📸 رافع صور المنتجات</h1>
<p class="subtitle">اختر مجلد imgs ثم أسقط كل صورة على بطاقتها</p>

<button id="pick-btn" onclick="pickFolder()">📁 اختر مجلد imgs</button>
<div id="folder-name"></div>

<div class="grid" id="grid"></div>

<p class="note">يعمل فقط على Chrome / Edge · الصور تُحفظ مباشرة في مجلد imgs بالاسم الصحيح</p>

<script>
const products = [
  { filename: 'tiger-cake.png',        nameAr: 'كيكة التايجر',   emoji: '🐯' },
  { filename: 'mango-cake.png',        nameAr: 'كيكة المانجو',    emoji: '🥭' },
  { filename: 'grape-plain.png',       nameAr: 'ورق عنب سادة',    emoji: '🍋' },
  { filename: 'grape-pomegranate.png', nameAr: 'ورق عنب رمان',    emoji: '🌿' },
  { filename: 'grape-spicy.png',       nameAr: 'ورق عنب سبايسي',  emoji: '🌶️' },
  { filename: 'pistachio.png',         nameAr: 'فستقية',          emoji: '🟢' },
  { filename: 'basbousa.png',          nameAr: 'بسبوسة',          emoji: '🍰' },
  { filename: 'arabic-coffee.png',     nameAr: 'قهوة عربية',      emoji: '☕' },
  { filename: 'camp-box.png',          nameAr: 'بوكس المخيم',     emoji: '⛺' },
];

let dirHandle = null;

const grid = document.getElementById('grid');
products.forEach(p => {
  const zone = document.createElement('div');
  zone.className = 'zone';
  zone.dataset.filename = p.filename;
  zone.innerHTML = `
    <div class="emoji">${p.emoji}</div>
    <div class="name-ar">${p.nameAr}</div>
    <div class="filename">${p.filename}</div>
    <div class="hint">أسقط الصورة هنا</div>
    <div class="status"></div>
    <img class="preview" alt="">
  `;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('over'));
  zone.addEventListener('drop', e => handleDrop(e, zone));
  zone.addEventListener('click', () => clickUpload(zone));
  grid.appendChild(zone);
});

async function pickFolder() {
  try {
    dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    const btn = document.getElementById('pick-btn');
    btn.textContent = '✓ المجلد جاهز — ' + dirHandle.name;
    btn.classList.add('picked');
    const fn = document.getElementById('folder-name');
    fn.textContent = 'المجلد: ' + dirHandle.name;
    fn.style.display = 'block';
  } catch(e) { /* user cancelled */ }
}

async function handleDrop(e, zone) {
  e.preventDefault();
  zone.classList.remove('over');
  if (!dirHandle) { alert('اختر مجلد imgs أولاً بالضغط على الزر'); return; }
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith('image/')) { alert('يرجى إسقاط صورة فقط'); return; }
  await saveFile(file, zone);
}

async function clickUpload(zone) {
  if (!dirHandle) { alert('اختر مجلد imgs أولاً'); return; }
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = async () => { if (input.files[0]) await saveFile(input.files[0], zone); };
  input.click();
}

async function saveFile(file, zone) {
  const filename = zone.dataset.filename;
  const status = zone.querySelector('.status');
  status.textContent = 'جاري الحفظ...';
  try {
    const fh = await dirHandle.getFileHandle(filename, { create: true });
    const writable = await fh.createWritable();
    await writable.write(file);
    await writable.close();
    zone.classList.add('done');
    status.textContent = '✓ تم الحفظ';
    const preview = zone.querySelector('.preview');
    preview.src = URL.createObjectURL(file);
  } catch(e) {
    status.textContent = '❌ فشل: ' + e.message;
    console.error(e);
  }
}
</script>
</body>
</html>
